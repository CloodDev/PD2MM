name: Build & Release

on: [push]

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: npm
      - run: npm ci
      - name: Install flatpak
        run: |
          sudo apt-get update -q
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
      - run: npm run build
      - run: npx electron-builder build --linux --publish never --config electron-builder.mjs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: dist/PD2MM-*.flatpak

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx electron-builder build --win --publish never --config electron-builder.mjs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            dist/PD2MM-*.exe
            dist/PD2MM-*.exe.blockmap
            dist/latest.yml

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "tag=v$(jq -r .version < package.json)" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          pattern: '*-artifacts'
          path: dist
          merge-multiple: true

      - name: Create release
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --latest \
            dist/PD2MM-* \
            dist/latest.yml \
            --repo "${{ github.repository }}" \
            2>/dev/null || \
          gh release upload "$TAG" \
            dist/PD2MM-* \
            dist/latest.yml \
            --clobber \
            --repo "${{ github.repository }}"
